version: 0.2

phases:
  install:
    commands:
      - echo "Install phase"

  pre_build:
    commands:
      - echo "Checking required files..."
      - test -f index.html
      - test -f appspec.yml
      - test -f scripts/install_dependencies.sh
      - test -f scripts/start_server.sh
      - test -f scripts/validate_service.sh

  build:
    commands:
      - echo "Build phase"
      - echo "CI check completed successfully"

artifacts:
  files:
    - index.html
    - appspec.yml
    - scripts/**/*
